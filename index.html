<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirk Quiz Bee | Live 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-animate {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e293b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-animate text-white min-h-screen font-sans flex flex-col items-center">

    <div id="login-section" class="w-full max-w-md glass p-10 rounded-3xl shadow-2xl mt-20 transform transition-all">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-yellow-500 p-4 rounded-full mb-4 shadow-[0_0_20px_rgba(234,179,8,0.5)]">
                <i data-lucide="trophy" class="w-10 h-10 text-slate-900"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
                KIRK QUIZ BEE
            </h1>
        </div>
        
        <div class="space-y-5">
            <div class="relative">
                <i data-lucide="user" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>
                <input id="player-name" type="text" placeholder="Your Full Name" 
                    class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all">
            </div>
            <div class="relative">
                <i data-lucide="wallet" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i>
                <input id="player-gcash" type="text" placeholder="GCash Number" 
                    class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 focus:border-yellow-500 outline-none transition-all">
            </div>
            <button onclick="joinGame()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 p-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-yellow-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>ENTER ARENA</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div id="game-section" class="hidden w-full max-w-2xl glass p-8 rounded-3xl mt-10 shadow-2xl">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-500/20 p-2 rounded-lg">
                    <i data-lucide="user-check" class="text-yellow-500"></i>
                </div>
                <div>
                    <p id="display-name" class="font-bold text-xl"></p>
                    <p id="display-score" class="text-yellow-500 font-mono">SCORE: 0</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-red-500/20 px-5 py-2 rounded-2xl border border-red-500/30">
                <i data-lucide="timer" class="text-red-500 animate-pulse"></i>
                <span id="timer-display" class="text-3xl font-black font-mono text-red-500">30</span>
            </div>
        </div>

        <div id="question-container" class="text-center min-h-[300px] flex flex-col justify-center">
            <h2 id="question-text" class="text-3xl font-bold mb-10 leading-tight">Waiting for Host...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <div id="id-input-area" class="hidden space-y-4">
                <input id="id-answer" type="text" placeholder="Type answer here..." 
                    class="w-full p-5 rounded-2xl bg-slate-900/50 border border-slate-600 text-center text-2xl focus:border-green-500 outline-none">
                <button onclick="submitIdAnswer()" class="w-full bg-green-600 hover:bg-green-500 p-5 rounded-2xl font-bold text-xl transition-all shadow-lg">SUBMIT ANSWER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-3xl glass mt-10 p-8 rounded-3xl border-2 border-yellow-500/50 shadow-2xl mb-20">
        <div class="flex items-center gap-3 mb-6">
            <i data-lucide="settings" class="text-yellow-500"></i>
            <h2 class="text-2xl font-bold">GAME MASTER CONSOLE</h2>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-4">
                <textarea id="admin-q" placeholder="Enter Question" class="w-full p-4 bg-slate-900/50 rounded-xl border border-slate-700 h-32"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <input id="admin-o1" placeholder="Option A" class="p-3 bg-slate-900/50 rounded-lg border border-slate-700">
                    <input id="admin-o2" placeholder="Option B" class="p-3 bg-slate-900/50 rounded-lg border border-slate-700">
                    <input id="admin-o3" placeholder="Option C" class="p-3 bg-slate-900/50 rounded-lg border border-slate-700">
                    <input id="admin-o4" placeholder="Option D" class="p-3 bg-slate-900/50 rounded-lg border border-slate-700">
                </div>
                <input id="admin-ans" placeholder="Correct Answer (Exact)" class="w-full p-3 bg-green-900/30 border border-green-500/50 rounded-xl">
                <button onclick="publishQuestion()" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="send"></i> PUSH LIVE
                </button>
            </div>

            <div class="bg-slate-900/50 rounded-2xl p-6 border border-slate-700">
                <h3 class="font-bold flex items-center gap-2 mb-4">
                    <i data-lucide="list-ordered" class="text-yellow-500"></i> LIVE RANKINGS
                </h3>
                <div id="leaderboard" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA-aP3QyWeQfeYvI7GNO58mz9BK2BCndtw",
            authDomain: "kirkquizbee.firebaseapp.com",
            projectId: "kirkquizbee",
            storageBucket: "kirkquizbee.firebasestorage.app",
            messagingSenderId: "993772090411",
            appId: "1:993772090411:web:245d6f0401570fe54c666e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myName = "";
        let currentCorrectAns = "";

        if(window.location.search.includes('admin=true')) {
            document.getElementById('admin-panel').classList.remove('hidden');
            loadLeaderboard();
        }

        function joinGame() {
            const name = document.getElementById('player-name').value;
            const gcash = document.getElementById('player-gcash').value;
            if(!name) return alert("Please enter your name!");
            myName = name;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            document.getElementById('display-name').innerText = name;
            db.ref('players/' + name).set({ score: 0, gcash: gcash });
        }

        db.ref('gameState').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('timer-display').innerText = data.timer;
            if(data.status === "active") renderQuestion(data.current);
        });

        function renderQuestion(q) {
            document.getElementById('question-text').innerText = q.text;
            currentCorrectAns = q.answer;
            const grid = document.getElementById('options-grid');
            const idArea = document.getElementById('id-input-area');
            
            if(q.options) {
                idArea.classList.add('hidden');
                grid.innerHTML = "";
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "bg-slate-700/50 p-6 rounded-2xl border border-white/10 hover:border-yellow-500 hover:bg-yellow-500 hover:text-slate-900 transition-all text-xl font-bold shadow-lg";
                    btn.innerText = opt;
                    btn.onclick = () => checkAnswer(opt);
                    grid.appendChild(btn);
                });
            } else {
                grid.innerHTML = "";
                idArea.classList.remove('hidden');
            }
        }

        function checkAnswer(ans) {
            const isCorrect = ans.toLowerCase().trim() === currentCorrectAns.toLowerCase().trim();
            if(isCorrect) {
                db.ref('players/' + myName + '/score').transaction(s => (s || 0) + 10);
                alert("✅ CORRECT!");
            } else {
                alert("❌ WRONG! Correct answer: " + currentCorrectAns);
            }
            document.getElementById('question-text').innerText = "Waiting for next question...";
            document.getElementById('options-grid').innerHTML = "";
            document.getElementById('id-input-area').classList.add('hidden');
            
            // Update local score display
            db.ref('players/' + myName + '/score').once('value', s => {
                document.getElementById('display-score').innerText = "SCORE: " + (s.val() || 0);
            });
        }

        function submitIdAnswer() {
            checkAnswer(document.getElementById('id-answer').value);
            document.getElementById('id-answer').value = "";
        }

        function publishQuestion() {
            const text = document.getElementById('admin-q').value;
            const ans = document.getElementById('admin-ans').value;
            const opts = [
                document.getElementById('admin-o1').value,
                document.getElementById('admin-o2').value,
                document.getElementById('admin-o3').value,
                document.getElementById('admin-o4').value
            ].filter(o => o !== "");

            const qData = { text: text, answer: ans };
            if(opts.length > 0) qData.options = opts;

            db.ref('gameState').update({
                status: "active",
                timer: 30,
                current: qData
            });
        }

        function loadLeaderboard() {
            db.ref('players').on('value', snap => {
                const list = document.getElementById('leaderboard');
                list.innerHTML = "";
                const players = [];
                snap.forEach(child => {
                    players.push({ name: child.key, ...child.val() });
                });
                players.sort((a,b) => b.score - a.score);
                players.forEach((p, index) => {
                    const rankIcon = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "🔹";
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-3 rounded-xl bg-slate-800 border border-white/5 shadow-inner">
                            <span class="flex items-center gap-2">
                                <span class="text-lg">${rankIcon}</span>
                                <span class="font-medium">${p.name} <br><span class="text-[10px] text-slate-500">${p.gcash || 'No GCash'}</span></span>
                            </span>
                            <span class="text-yellow-500 font-bold font-mono">${p.score}</span>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
